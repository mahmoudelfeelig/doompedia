<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4f6f2" />
    <title>Doompedia</title>
    <meta
      name="description"
      content="Browse, search, and save a visual collection of Wikipedia summaries."
    />
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-compass" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-2.1 6.3-6.3 2.1 2.1-6.3z"/></symbol>
      <symbol id="icon-bookmark" viewBox="0 0 24 24"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5M12 15V3"/></symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M12.2 2h-.4a2 2 0 0 0-2 2v.2a2 2 0 0 1-1 1.7l-.4.2a2 2 0 0 1-2 0l-.1-.1a2 2 0 0 0-2.7.7l-.2.4a2 2 0 0 0 .7 2.7l.1.1a2 2 0 0 1 1 1.7v.5a2 2 0 0 1-1 1.7l-.1.1a2 2 0 0 0-.7 2.7l.2.4a2 2 0 0 0 2.7.7l.1-.1a2 2 0 0 1 2 0l.4.2a2 2 0 0 1 1 1.7v.2a2 2 0 0 0 2 2h.4a2 2 0 0 0 2-2v-.2a2 2 0 0 1 1-1.7l.4-.2a2 2 0 0 1 2 0l.1.1a2 2 0 0 0 2.7-.7l.2-.4a2 2 0 0 0-.7-2.7l-.1-.1a2 2 0 0 1-1-1.7v-.5a2 2 0 0 1 1-1.7l.1-.1a2 2 0 0 0 .7-2.7l-.2-.4a2 2 0 0 0-2.7-.7l-.1.1a2 2 0 0 1-2 0l-.4-.2a2 2 0 0 1-1-1.7V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></symbol>
      <symbol id="icon-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></symbol>
      <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5"/></symbol>
      <symbol id="icon-share" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 10.5 6.8-4M8.6 13.5l6.8 4"/></symbol>
      <symbol id="icon-external" viewBox="0 0 24 24"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></symbol>
      <symbol id="icon-x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"/></symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
      <symbol id="icon-sparkles" viewBox="0 0 24 24"><path d="m12 3-1.5 4.5L6 9l4.5 1.5L12 15l1.5-4.5L18 9l-4.5-1.5zM5 3v4M3 5h4M19 16v5M16.5 18.5h5"/></symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 15H6L5 6M10 11v5M14 11v5"/></symbol>
      <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
    </svg>

    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="#/explore" aria-label="Doompedia home">
          <img src="/assets/elephant-logo.png" alt="" />
          <span>Doompedia</span>
        </a>
        <nav class="primary-nav" aria-label="Primary navigation">
          <a href="#/explore" data-route="explore"><svg><use href="#icon-compass"/></svg><span>Explore</span></a>
          <a href="#/saved" data-route="saved"><svg><use href="#icon-bookmark"/></svg><span>Saved</span><b id="saved-count">0</b></a>
          <a href="#/packs" data-route="packs"><svg><use href="#icon-download"/></svg><span>Packs</span></a>
          <a href="#/settings" data-route="settings"><svg><use href="#icon-settings"/></svg><span>Settings</span></a>
        </nav>
        <a class="about-link" href="#/about" data-route="about"><svg><use href="#icon-info"/></svg><span>About</span></a>
      </aside>

      <div class="workspace">
        <header class="mobile-header">
          <a class="brand" href="#/explore"><img src="/assets/elephant-logo.png" alt="" /><span>Doompedia</span></a>
          <button class="icon-button" type="button" data-action="open-search" aria-label="Search"><svg><use href="#icon-search"/></svg></button>
        </header>
        <main id="view" tabindex="-1">
          <div class="loading-view">
            <img src="/assets/elephant-logo.png" alt="" />
            <div class="loading-line"></div>
            <div class="loading-line short"></div>
          </div>
        </main>
      </div>
    </div>

    <nav class="bottom-nav" aria-label="Mobile navigation">
      <a href="#/explore" data-route="explore"><svg><use href="#icon-compass"/></svg><span>Explore</span></a>
      <a href="#/saved" data-route="saved"><svg><use href="#icon-bookmark"/></svg><span>Saved</span></a>
      <a href="#/packs" data-route="packs"><svg><use href="#icon-download"/></svg><span>Packs</span></a>
      <a href="#/settings" data-route="settings"><svg><use href="#icon-settings"/></svg><span>Settings</span></a>
    </nav>

    <div id="dialog-root"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
